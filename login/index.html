<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeautyBook - Login</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body>
    <main class="auth-main">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <h2>Account Login</h2>
            <p>Welcome back!</p>
          </div>

          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label for="email">Email <span class="required">*</span></label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@mail.com"
                required
              />
              <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
              <label for="password"
                >Password <span class="required">*</span></label
              >
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" id="remember" name="remember" />
                <span>Remember me</span>
              </label>
              <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="auth-btn" id="loginBtn">
              <span>Sign in</span>
              <div class="loader hidden"></div>
            </button>
          </form>

          <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Sign up</a></p>
          </div>

          <div class="auth-divider">
            <span>or</span>
          </div>

          <div class="social-auth">
            <button class="social-btn google">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4"
                />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05"
                />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335"
                />
              </svg>
              Google
            </button>
            <button class="social-btn vk">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path
                  d="M15.07 2H8.93C3.33 2 2 3.33 2 8.93v6.14C2 20.67 3.33 22 8.93 22h6.14c5.6 0 6.93-1.33 6.93-6.93V8.93C22 3.33 20.67 2 15.07 2zm3.56 14.6h-1.88c-.72 0-.94-.54-2.23-1.88-1.11-1.07-1.6-1.2-1.87-1.2-.38 0-.49.11-.49.64v1.58c0 .43-.14.69-1.29.69-1.9 0-4.01-1.16-5.49-3.33-2.12-2.96-2.69-5.19-2.69-5.64 0-.27.11-.53.64-.53h1.89c.48 0 .65.21.83.69.91 2.28 2.44 4.27 3.07 4.27.24 0 .35-.11.35-.7V9.83c-.07-1.28-.78-1.39-.78-1.85 0-.22.18-.43.48-.43h2.95c.4 0 .54.21.54.67v3.66c0 .4.17.54.27.54.22 0 .4-.14.81-.59 1.15-1.34 1.97-3.39 1.97-3.39.1-.27.27-.48.75-.48h1.89c.56 0 .69.29.56.69-.24 1.12-2.55 3.86-2.55 3.86-.2.27-.27.4 0 .7.2.27.86.83 1.3 1.34.81.86 1.43 1.59 1.59 1.99.27.59-.13.86-.67.86z"
                />
              </svg>
              VK
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="/js/auth.js"></script>
  </body>
</html>
